zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 3dcd5bbe90534f9e8eb5c2d53756af63
      name: Templates/Power
  templates:
    - uuid: 0b23309dfbfd4cd1af09db6c1bec5db8
      template: 'Template UPS LogBlueWeb SNMP'
      name: 'Nobreak UPS LogBlueWeb SNMP'
      description: |
        Template para monitoramento de nobreaks compatíveis com LogBlueWeb - UPS Agent via SNMP.
        Inclui monitoramento de status, carga, bateria, temperatura, tensão de entrada e saída,
        frequência, falhas de energia e disponibilidade SNMP.
        Desenvolvido por Diego Pereira - DinfraTech.
      groups:
        - name: Templates/Power
      items:
        - uuid: 59b06c3717b1451d91a518d011b3e4a9
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 3107222751f24b92ac8a25f3b6cb7b8f
              expression: 'max(/Template UPS LogBlueWeb SNMP/icmpping,#3)=0'
              name: 'Network Generic Device: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: eb070adb96ab4095b1989a437ff1c046
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
        - uuid: b00891d710f840a6b54480e83ffb1fbb
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'The ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 9158667f83eb4653acdc806d3c472ba6
              expression: 'avg(/Template UPS LogBlueWeb SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Network Generic Device: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'Network Generic Device: Unavailable by ICMP ping'
                  expression: 'max(/Template UPS LogBlueWeb SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 76dddb042c414e369296befec13a47e3
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 914c4c11e7c04fe59912ad39e681d701
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person. If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 9b7d4eb89f664dc2a5cdb99b2b9be654
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 4341e688fe9e4719884d853c8dfe4adf
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: f328dc3d492e45cd9a960052c45670c0
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: f9e3ce6ae31c45c5b6b97e3a0ce20fe3
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: d1250f2940564746891e8823d1fb5b36
              expression: 'last(/Template UPS LogBlueWeb SNMP/system.name,#1)<>last(/Template UPS LogBlueWeb SNMP/system.name,#2) and length(last(/Template UPS LogBlueWeb SNMP/system.name))>0'
              name: 'Network Generic Device: System name has changed'
              event_name: 'Network Generic Device: System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: 10b96ae9d30c413a8bc0d70b94b2d154
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 69f007a5a54f4ccca485a9bee1910eac
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 985e1b7f62a74741a6996b8cb85475e3
          name: Bateria
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.4.0
          key: ups.battery
          units: '%'
          tags:
            - tag: power
              value: nobreak
          triggers:
            - uuid: c5906ff94a724eaa9556b5fe7417c3bb
              expression: 'last(/Template UPS LogBlueWeb SNMP/ups.battery)<30'
              name: '🔋 Bateria baixa {HOST.NAME}'
              priority: HIGH
              dependencies:
                - name: '⚠️ Falta de energia {HOST.NAME}'
                  expression: 'min(/Template UPS LogBlueWeb SNMP/ups.status,1m)=3'
        - uuid: f7e27985beab4dd5869bc58008da3ffe
          name: 'Frequência entrada'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.2.1
          key: ups.input.frequency
          value_type: FLOAT
          units: Hz
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: power
              value: nobreak
          triggers:
            - uuid: 526430fdd06b48d988a5babf40922180
              expression: |
                last(/Template UPS LogBlueWeb SNMP/ups.input.frequency)<57
                or
                last(/Template UPS LogBlueWeb SNMP/ups.input.frequency)>61
              name: 'frequência fora do padrão'
              priority: AVERAGE
            - uuid: 6b9f72bc0ac5453eb8c4618b8b077f1b
              expression: |
                last(/Template UPS LogBlueWeb SNMP/ups.input.frequency)<57
                or
                last(/Template UPS LogBlueWeb SNMP/ups.input.frequency)>61
              name: 'Frequência Fora do Padrão'
        - uuid: cbe101060504499c90c003714e8056f3
          name: 'Tensão entrada'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.3.1
          key: ups.input.voltage
          units: V
          tags:
            - tag: power
              value: nobreak
        - uuid: d01881270f4b40c8b54befd4a1872d3b
          name: Carga
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.5.1
          key: ups.load
          units: '%'
          tags:
            - tag: power
              value: nobreak
          triggers:
            - uuid: a6168c54290743309ecdc3591b512448
              expression: 'last(/Template UPS LogBlueWeb SNMP/ups.load)>80'
              name: '⚡ Sobrecarga {HOST.NAME}'
              priority: WARNING
        - uuid: 166b02400b2049958fd768bbeff0f862
          name: 'Tensão saída'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.2.1
          key: ups.output.voltage
          units: V
          tags:
            - tag: power
              value: nobreak
        - uuid: d73e7fd7c70b4f2d82d60160dd27bf7b
          name: 'Falhas de energia'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.935.1.1.1.9.1.1.0
          key: ups.power.fail.count
          tags:
            - tag: power
              value: nobreak
        - uuid: fbafbf5e07324f40b5baa3b553b12a68
          name: Status
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.1.0
          key: ups.status
          tags:
            - tag: power
              value: nobreak
          triggers:
            - uuid: 6e2661569a1c4f49919df8023755c31d
              expression: 'min(/Template UPS LogBlueWeb SNMP/ups.status,1m)=3'
              name: '⚠️ Falta de energia {HOST.NAME}'
              priority: HIGH
        - uuid: 84066be1527445e1a88bdd7c3cb6e736
          name: Temperatura
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.935.1.1.1.2.2.3.0
          key: ups.temperature
          value_type: FLOAT
          units: °C
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: power
              value: nobreak
          triggers:
            - uuid: 82bdd105e9b74135a3f91b07953e5fc6
              expression: 'min(/Template UPS LogBlueWeb SNMP/ups.temperature,2m)>40'
              name: 'Temperatura alta no nobreak {HOST.NAME}'
              priority: HIGH
            - uuid: 19716a213edc450c9e4cd9586ab48f5a
              expression: 'min(/Template UPS LogBlueWeb SNMP/ups.temperature,2m)>50'
              name: 'Temperatura crítica no nobreak {HOST.NAME}'
              priority: DISASTER
        - uuid: e0be5d99e376406ba2bae6406280d7cb
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: a7a8039d1bad4c9e995ce103f210c496
              expression: 'max(/Template UPS LogBlueWeb SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Network Generic Device: No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: 'Network Generic Device: Unavailable by ICMP ping'
                  expression: 'max(/Template UPS LogBlueWeb SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
      valuemaps:
        - uuid: a53ab7bc5015476b8f6b8ccdf8ca1859
          name: Status_atual
          mappings:
            - value: '2'
              newvalue: Online
            - value: '3'
              newvalue: 'Em bateria'
            - value: '4'
              newvalue: 'Bateria baixa'
  triggers:
    - uuid: 91d7ff178b2e4525ad29381f48bae601
      expression: '(last(/Template UPS LogBlueWeb SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Template UPS LogBlueWeb SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Template UPS LogBlueWeb SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/Template UPS LogBlueWeb SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'Network Generic Device: Host has been restarted'
      event_name: 'Network Generic Device: {HOST.NAME} has been restarted (uptime < 10m)'
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'Network Generic Device: No SNMP data collection'
          expression: 'max(/Template UPS LogBlueWeb SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
        - tag: scope
          value: notice
